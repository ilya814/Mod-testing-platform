name: ModForge

on:
  repository_dispatch:
    types: [test-mod, play-minecraft]

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup display and VNC
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb x11vnc novnc websockify wget curl python3 unzip -qq
          Xvfb :1 -screen 0 1280x720x24 &
          echo "DISPLAY=:1" >> $GITHUB_ENV
          sleep 2
          x11vnc -display :1 -nopw -forever -rfbport 5901 -quiet &
          sleep 1
          websockify --web /usr/share/novnc/ 6080 localhost:5901 &
          sleep 1
      - name: Start tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -O /tmp/cf.deb
          sudo dpkg -i /tmp/cf.deb
          cloudflared tunnel --url http://localhost:6080 --no-autoupdate --logfile /tmp/cf.log &
          for i in $(seq 1 30); do
            sleep 2
            URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cf.log 2>/dev/null | head -1)
            if [ -n "$URL" ]; then echo "STREAM_URL=$URL" >> $GITHUB_ENV; break; fi
          done
      - name: Download mod
        run: |
          MOD_URL="${{ github.event.client_payload.mod_url }}"
          if [ -n "$MOD_URL" ] && [ "$MOD_URL" != "null" ]; then
            wget -q "$MOD_URL" -O /tmp/mod.jar && echo "Mod downloaded"
          fi
      - name: Detect and install Minecraft
        run: |
          MC="$HOME/.minecraft"
          mkdir -p "$MC/mods" /tmp/meta
          [ -f /tmp/mod.jar ] && unzip -q /tmp/mod.jar -d /tmp/meta 2>/dev/null || true
          LOADER="fabric"
          [ -f /tmp/meta/quilt.mod.json ] && LOADER="quilt"
          [ -f /tmp/meta/META-INF/neoforge.mods.toml ] && LOADER="neoforge"
          [ -f /tmp/meta/META-INF/mods.toml ] && LOADER="forge"
          VERSION="${{ github.event.client_payload.version }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            VERSION=$(python3 -c "
          import json,os
          f='/tmp/meta/fabric.mod.json'
          if os.path.exists(f):
            d=json.load(open(f))
            v=d.get('depends',{}).get('minecraft','1.21.1').strip().lstrip('>=~^').split(' ')[0].split(',')[0]
            print(v+'.1' if len(v.split('.'))==2 else v)
          else: print('1.21.1')
          " 2>/dev/null || echo "1.21.1")
          fi
          case "$LOADER" in
            fabric)
              wget -q https://maven.fabricmc.net/net/fabricmc/fabric-installer/1.0.0/fabric-installer-1.0.0.jar -O /tmp/fi.jar
              java -jar /tmp/fi.jar client -dir "$MC" -mcversion "$VERSION" -noprofile 2>/dev/null || true
              FA=$(curl -s "https://api.modrinth.com/v2/project/P7dR8mSH/version?game_versions=%5B%22$VERSION%22%5D&loaders=%5B%22fabric%22%5D" | python3 -c "import sys,json;print(json.load(sys.stdin)[0]['files'][0]['url'])" 2>/dev/null || echo "")
              [ -n "$FA" ] && wget -q "$FA" -O "$MC/mods/fabric-api.jar"
              ;;
            forge)
              B=$(python3 -c "print({'1.21.1':'51.0.33','1.20.4':'49.0.48','1.20.1':'47.3.0','1.19.4':'45.3.0','1.19.2':'43.3.0','1.18.2':'40.2.21','1.16.5':'36.2.39'}.get('$VERSION','47.3.0'))")
              wget -q "https://maven.minecraftforge.net/net/minecraftforge/forge/$VERSION-$B/forge-$VERSION-$B-installer.jar" -O /tmp/fi.jar
              java -jar /tmp/fi.jar --installClient "$MC" 2>/dev/null || true
              ;;
            quilt)
              wget -q https://quiltmc.org/api/v1/download-latest-installer/java-universal -O /tmp/fi.jar
              java -jar /tmp/fi.jar install client "$VERSION" --install-dir="$MC" 2>/dev/null || true
              ;;
            neoforge)
              N=$(python3 -c "print('$VERSION'.replace('1.','',1))")
              wget -q "https://maven.neoforged.net/releases/net/neoforged/neoforge/${N}.0/neoforge-${N}.0-installer.jar" -O /tmp/fi.jar
              java -jar /tmp/fi.jar --installClient "$MC" 2>/dev/null || true
              ;;
          esac
          [ -f /tmp/mod.jar ] && cp /tmp/mod.jar "$MC/mods/"
          echo "MC=$MC" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Launch Minecraft
        run: |
          VER=$(ls "$MC/versions/" | head -1)
          JAR=$(find "$MC/versions/$VER" -name "*.jar" | grep -v natives | head -1)
          LIBS=$(find "$MC/libraries" -name "*.jar" 2>/dev/null | tr '\n' ':')
          java -Xmx4G -Xms1G -XX:+UseG1GC \
            -Djava.library.path="$MC/versions/$VER/${VER}-natives" \
            -cp "${JAR}:${LIBS}" net.minecraft.client.main.Main \
            --username ModTester --version "$VER" \
            --gameDir "$MC" --assetsDir "$MC/assets" \
            --accessToken 0 --userType offline \
            2>&1 | tee /tmp/game.log &
          PASS=false
          for i in $(seq 1 40); do
            sleep 3
            grep -qE "Exception in thread|FATAL" /tmp/game.log 2>/dev/null && break
            grep -qE "Setting user|Loading Minecraft|Initializing" /tmp/game.log 2>/dev/null && PASS=true && break
          done
          echo "PASS=$PASS" >> $GITHUB_ENV
      - name: Post result
        uses: actions/github-script@v7
        with:
          script: |
            const action = context.payload.action;
            const sid = context.payload.client_payload.session_id;
            const url = process.env.STREAM_URL || '';
            const pass = process.env.PASS === 'true';
            const fs = require('fs');
            const logTxt = fs.existsSync('/tmp/game.log') ? fs.readFileSync('/tmp/game.log','utf8') : '';
            const errors = logTxt.split('\n').filter(l=>/Exception|FATAL/.test(l)).slice(0,10).join('\n');
            const body = action === 'test-mod'
              ? (pass ? `MODFORGE SESSION=${sid} RESULT=pass` : `MODFORGE SESSION=${sid} RESULT=fail LOG=${errors}`)
              : `MODFORGE SESSION=${sid} URL=${url}`;
            try {
              await github.rest.issues.createComment({owner:context.repo.owner,repo:context.repo.repo,issue_number:1,body});
            } catch {
              await github.rest.issues.create({owner:context.repo.owner,repo:context.repo.repo,title:'ModForge Sessions',body:'Auto-created.'});
              await github.rest.issues.createComment({owner:context.repo.owner,repo:context.repo.repo,issue_number:1,body});
            }
      - name: Keep alive for play mode
        if: github.event.action == 'play-minecraft'
        run: tail -f /tmp/game.log
